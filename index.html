<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRIS Batik Seng</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  body{
    background:#f5f5f5;
    font-family:Arial,sans-serif;
  }

  /* Container Aplikasi */
  .web-app-container{
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
    height:100vh;
  }

  /* Frame Aplikasi */
  .web-app-frame{
    width:100%;
    max-width:480px;
    height:100%;
    max-height:850px;
    border:none;
    background:#fff;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
    transition:.3s;
  }

  /* Mobile */
  @media (max-width:480px){
    .web-app-frame{
      max-width:100%;
      max-height:100%;
      border-radius:0;
      box-shadow:none;
    }
  }
</style>

</head>
<body>

<div class="web-app-container">
  <iframe
    class="web-app-frame"
    src="https://script.google.com/macros/s/AKfycbx0Yz2JgeoJUNbstm8iM_hcu9pLUQz8B6kbHl80kB4krovYRBHhD5c1k6WUZCjtN8P0kQ/exec"
    allow="camera; geolocation"
    loading="lazy">
  </iframe>
</div>

</body>
</html>
