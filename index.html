<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRIS Batik Seng</title>

<style>
      html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f4f6f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

  /* Container Aplikasi */
  .web-app-container{
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
    height:100vh;
  }

  /* Frame Aplikasi */
  .web-app-frame{
    width:100%;
    max-width:1080px;
    height:100%;
    max-height:850px;
    border:none;
    background:#fff;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
    transition:.3s;
  }

  /* Mobile */
  @media (max-width:480px){
    .web-app-frame{
      max-width:100%;
      max-height:100%;
      border-radius:0;
      box-shadow:none;
    }
  }
</style>

</head>
<body>

<div class="web-app-container">
  <iframe
    class="web-app-frame"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
    src="https://script.google.com/macros/s/AKfycbzeA5s__FlNuIGFrtjsvHmkwmrshhC6rglTbVtWNiUFThulMkj8TINH5pR3ctpQ5hjF/exec"
    allow="camera; geolocation"
    loading="lazy">
  </iframe>
</div>

</body>
</html>
